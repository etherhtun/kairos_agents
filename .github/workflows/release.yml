name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── macOS Apple Silicon (arm64) ───────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow certifi "truststore; python_version>='3.10'"
          pip install -r sync/requirements.txt

      - name: Build .app
        run: python -m PyInstaller kairos.spec --noconfirm

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          for attempt in 1 2 3; do
            hdiutil create \
              -volname "Kairos Agent" \
              -srcfolder dist/Kairos.app \
              -ov -format UDZO \
              "dist/Kairos-${VERSION}-mac.dmg" && break
            echo "hdiutil attempt $attempt failed, retrying in 5s..."
            sleep 5
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          files: dist/Kairos-*-mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker (linux/amd64 + linux/arm64) ────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/etherhtun/kairos-agent:latest
            ghcr.io/etherhtun/kairos-agent:${{ github.ref_name || inputs.version }}
          build-args: |
            APP_VERSION=${{ github.ref_name || inputs.version }}

  # ── Windows (x86_64) ───────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow certifi
          pip install -r sync/requirements.txt

      - name: Build .exe
        run: python -m PyInstaller kairos_win.spec --noconfirm

      - name: Zip output
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          if (-not $VERSION) { $VERSION = "${{ inputs.version }}" }
          Compress-Archive -Path dist\Kairos -DestinationPath "dist\Kairos-${VERSION}-windows.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          files: dist/Kairos-*-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
