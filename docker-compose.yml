services:
  kairos-agent:
    # Prebuilt image from CI (release.yml, on version-tag push). Deploy new code by
    # tagging a release, then `docker compose pull && docker compose up -d` here.
    image: ghcr.io/etherhtun/kairos-agent:latest
    container_name: kairos-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:7432:7432"   # dashboard only reachable from this machine
    volumes:
      - ~/.kairos-agent:/root/.kairos-agent
    environment:
      - TZ=America/New_York          # sane log timestamps + legacy HOUR:MIN in ET
      - AUTO_SYNC_INTERVAL_MIN=60     # sync every 60 min during US market hours (RTH)
      # Legacy once-daily fallback (used only when AUTO_SYNC_INTERVAL_MIN=0):
      - AUTO_SYNC_HOUR=16
      - AUTO_SYNC_MIN=30
